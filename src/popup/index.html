<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanted Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>Wanted Manager</h1>
      </header>

      <section>
        <h2>규칙 추가</h2>
        <form id="rule-form">
          <label for="company-keywords">회사명 키워드 (콤마 구분)</label>
          <input id="company-keywords" name="companyKeywords" type="text" placeholder="예: 토스, 네이버" />

          <label for="title-keywords">공고 제목 키워드 (콤마 구분)</label>
          <input id="title-keywords" name="titleKeywords" type="text" placeholder="예: 프론트엔드, 시니어" />

          <label for="job-refs">링크/ID (콤마 구분)</label>
          <input id="job-refs" name="jobRefs" type="text" placeholder="예: 859, /wd/859" />

          <button id="add-rule" type="submit">규칙 추가</button>
        </form>
      </section>

      <section>
        <details>
          <summary>가린 공고 목록 (현재 페이지)</summary>
          <div id="hidden-job-list" class="hidden-list"></div>
        </details>
        <details>
          <summary>규칙 목록</summary>
          <div id="rule-list" class="rule-list"></div>
        </details>
        <p id="rule-error" class="error" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
